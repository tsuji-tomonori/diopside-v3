name: CI API

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  ci-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck
        env:
          JWT_DEV_BYPASS: "1"
          NODE_ENV: test
        run: npm run typecheck

      - name: Build
        env:
          JWT_DEV_BYPASS: "1"
          NODE_ENV: test
        run: npm run build

      - name: Test
        env:
          JWT_DEV_BYPASS: "1"
          NODE_ENV: test
        run: npm test
