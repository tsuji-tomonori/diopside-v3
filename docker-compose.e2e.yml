services:
  api:
    environment:
      E2E_MOCK: "1"
      JWT_DEV_BYPASS: "1"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: diopside-v3-web
    environment:
      VITE_API_PROXY_TARGET: http://api:3000
    depends_on:
      api:
        condition: service_started
    ports:
      - "5173:5173"
