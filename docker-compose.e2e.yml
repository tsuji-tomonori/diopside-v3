services:
  api:
    environment:
      NODE_ENV: "test"
      E2E_TEST_MODE: "1"
      E2E_TEST_SECRET: "e2e-secret"
      JWT_ISSUER: "http://api:3000/e2e-issuer"
      JWT_JWKS_URL: "http://api:3000/e2e-issuer/.well-known/jwks.json"
      COGNITO_AUDIENCE: "diopside-e2e"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: diopside-v3-web
    environment:
      VITE_API_PROXY_TARGET: http://api:3000
    depends_on:
      api:
        condition: service_started
    ports:
      - "5173:5173"
