services:
  postgres:
    image: postgres:16-alpine
    container_name: diopside-v3-postgres
    environment:
      POSTGRES_DB: diopside
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - diopside_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d diopside"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: diopside-v3-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/diopside?schema=public
      PORT: "3000"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3000"

volumes:
  diopside_postgres_data:
