version: '3'

vars:
  ROOT_DIR: '{{.TASKFILE_DIR}}'
  QUARTZ_DIR: '{{.ROOT_DIR}}/quartz'
  QUARTZ_CONFIG_SOURCE: '{{.ROOT_DIR}}/config/quartz/quartz.config.ts'
  QUARTZ_CUSTOM_STYLE_SOURCE: '{{.ROOT_DIR}}/config/quartz/custom.scss'
  INFRA_DIR: '{{.ROOT_DIR}}/infra'
  API_DIR: '{{.ROOT_DIR}}/api'
  SITE_ASSET_PATH: '{{.ROOT_DIR}}/quartz/public'
  STACK: 'DiopsideDeliveryStack'
  CDK_ARGS: ''
  DOCS_SITE_URL: ''

  # Single-PDF build output (Pandoc + XeLaTeX + Mermaid)
  DOCS_PDF_OUT: '{{.ROOT_DIR}}/reports/diopside-docs.pdf'
  DOCS_PDF_BUILD_DIR: '{{.ROOT_DIR}}/.build/docs-pdf'

tasks:
  precommit:
    desc: Install pre-commit hook
    cmds:
      - pre-commit install

  precommit:run:
    desc: Run pre-commit on changed files
    cmds:
      - pre-commit run

  precommit:run:all:
    desc: Run pre-commit on all files
    cmds:
      - pre-commit run --all-files

  docs:autolink:
    desc: Auto-link glossary for specified markdown files (FILES="docs/...md ...")
    cmds:
      - |
        bash -lc 'if [ -z "{{.FILES}}" ]; then
          echo "Usage: task docs:autolink FILES=\"docs/path/a.md docs/path/b.md\""
          exit 1
        fi
        python3 .opencode/skills/obsidian-doc-new/scripts/auto_link_glossary.py {{.FILES}}'

  docs:autolink:check:
    desc: Check glossary links for specified markdown files (FILES="docs/...md ...")
    cmds:
      - |
        bash -lc 'if [ -z "{{.FILES}}" ]; then
          echo "Usage: task docs:autolink:check FILES=\"docs/path/a.md docs/path/b.md\""
          exit 1
        fi
        python3 .opencode/skills/obsidian-doc-new/scripts/auto_link_glossary.py --docs-root docs --check {{.FILES}}'

  docs:autolink:changed:
    desc: Auto-link glossary for changed docs markdown files
    cmds:
      - |
        python3 - <<'PY'
        import os
        import shlex
        import subprocess
        import sys

        changed = subprocess.check_output(["git", "-c", "core.quotepath=false", "diff", "--name-only", "HEAD"], text=True)
        untracked = subprocess.check_output(["git", "-c", "core.quotepath=false", "ls-files", "--others", "--exclude-standard"], text=True)
        files = []
        for src in (changed.splitlines(), untracked.splitlines()):
            for path in src:
                path = path.strip()
                if not path.startswith("docs/") or not path.endswith(".md"):
                    continue
                if path.endswith("/README.md") or path.endswith("/TEMPLATE.md"):
                    continue
                if "/21.単体テストケース(CASE)/" in path and path.endswith("-PW.md"):
                    continue
                if not os.path.isfile(path):
                    continue
                files.append(path)
        files = sorted(set(files))
        if not files:
            print("No changed docs markdown files. Skipping auto-link.")
            sys.exit(0)

        cmd = ["python3", ".opencode/skills/obsidian-doc-new/scripts/auto_link_glossary.py", *files]
        print("+", " ".join(shlex.quote(x) for x in cmd))
        subprocess.run(cmd, check=True)
        PY

  docs:mermaid:fix:
    desc: Auto-fix Mermaid labels for specified markdown files (FILES="docs/...md ...")
    cmds:
      - |
        bash -lc 'if [ -z "{{.FILES}}" ]; then
          echo "Usage: task docs:mermaid:fix FILES=\"docs/path/a.md docs/path/b.md\""
          exit 1
        fi
        python3 .opencode/skills/obsidian-doc-check/scripts/fix_mermaid_blocks.py --docs-root docs {{.FILES}}'

  docs:mermaid:fix:changed:
    desc: Auto-fix Mermaid labels for changed docs markdown files
    cmds:
      - |
        python3 - <<'PY'
        import os
        import shlex
        import subprocess
        import sys

        changed = subprocess.check_output(["git", "-c", "core.quotepath=false", "diff", "--name-only", "HEAD"], text=True)
        untracked = subprocess.check_output(["git", "-c", "core.quotepath=false", "ls-files", "--others", "--exclude-standard"], text=True)
        files = []
        for src in (changed.splitlines(), untracked.splitlines()):
            for path in src:
                path = path.strip()
                if not path.startswith("docs/") or not path.endswith(".md"):
                    continue
                if path.endswith("/README.md") or path.endswith("/TEMPLATE.md"):
                    continue
                if not os.path.isfile(path):
                    continue
                files.append(path)
        files = sorted(set(files))
        if not files:
            print("No changed docs markdown files. Skipping Mermaid auto-fix.")
            sys.exit(0)

        cmd = ["python3", ".opencode/skills/obsidian-doc-check/scripts/fix_mermaid_blocks.py", "--docs-root", "docs", *files]
        print("+", " ".join(shlex.quote(x) for x in cmd))
        subprocess.run(cmd, check=True)
        PY

  docs:check:
    desc: Validate all docs and update reports/doc_check.md
    cmds:
      - python3 .opencode/skills/obsidian-doc-check/scripts/validate_vault.py --docs-root docs --report reports/doc_check.md

  docs:check:changed:
    desc: Validate changed docs and update reports/doc_check.md
    cmds:
      - |
        python3 - <<'PY'
        import os
        import shlex
        import subprocess
        import sys

        changed = subprocess.check_output(["git", "-c", "core.quotepath=false", "diff", "--name-only", "HEAD"], text=True)
        untracked = subprocess.check_output(["git", "-c", "core.quotepath=false", "ls-files", "--others", "--exclude-standard"], text=True)
        files = []
        for src in (changed.splitlines(), untracked.splitlines()):
            for path in src:
                path = path.strip()
                if not path.startswith("docs/") or not path.endswith(".md"):
                    continue
                if path.endswith("/README.md") or path.endswith("/TEMPLATE.md"):
                    continue
                if not os.path.isfile(path):
                    continue
                files.append(path)
        files = sorted(set(files))
        if not files:
            print("No changed docs markdown files. Skipping validation.")
            sys.exit(0)

        cmd = [
            "python3",
            ".opencode/skills/obsidian-doc-check/scripts/validate_vault.py",
            "--docs-root",
            "docs",
            "--report",
            "reports/doc_check.md",
            "--targets",
            *files,
        ]
        print("+", " ".join(shlex.quote(x) for x in cmd))
        subprocess.run(cmd, check=True)
        PY

  docs:trace:
    desc: Generate static RTM views for Quartz
    cmds:
      - python3 .opencode/skills/obsidian-trace/scripts/generate_rtm_views.py --docs-root docs

  docs:guard:
    desc: Run docs auto-link and validation for changed docs
    cmds:
      - task docs:mermaid:fix:changed
      - task docs:autolink:changed
      - task docs:check:changed

  docs:ut:pairwise:generate:
    desc: Generate UT pairwise markdown cases from UT-PW models
    cmds:
      - python3 scripts/pairwise/generate_pairwise_md.py --strict

  docs:ut:pairwise:check:
    desc: Check generated UT pairwise markdown cases are up to date
    cmds:
      - python3 scripts/pairwise/generate_pairwise_md.py --strict --check

  docs:ut:quality:generate:
    desc: Generate UT quality aggregate docs from UT-STAT/COV
    cmds:
      - python3 scripts/ut_quality/generate_quality_md.py

  docs:ut:quality:check:
    desc: Check generated UT quality aggregate docs are up to date
    cmds:
      - python3 scripts/ut_quality/generate_quality_md.py --check

  docs:ut:stat:check:
    desc: Run all UT static analysis tools (UT-STAT-002 to 008)
    cmds:
      - python3 .opencode/skills/obsidian-doc-check/scripts/validate_vault.py --docs-root docs --report reports/doc_check.md
      - |
        python3 - <<'PY'
        import os
        import shlex
        import subprocess
        import sys

        changed = subprocess.check_output(["git", "-c", "core.quotepath=false", "diff", "--name-only", "HEAD"], text=True)
        untracked = subprocess.check_output(["git", "-c", "core.quotepath=false", "ls-files", "--others", "--exclude-standard"], text=True)
        files = []
        for src in (changed.splitlines(), untracked.splitlines()):
            for path in src:
                path = path.strip()
                if not path.startswith("docs/") or not path.endswith(".md"):
                    continue
                if path.endswith("/README.md") or path.endswith("/TEMPLATE.md"):
                    continue
                if "/21.単体テストケース(CASE)/" in path and path.endswith("-PW.md"):
                    continue
                if not os.path.isfile(path):
                    continue
                files.append(path)
        files = sorted(set(files))
        if not files:
            print("No changed docs markdown files. Skipping auto-link check.")
            sys.exit(0)

        cmd = [
            "python3",
            ".opencode/skills/obsidian-doc-new/scripts/auto_link_glossary.py",
            "--docs-root",
            "docs",
            "--check",
            *files,
        ]
        print("+", " ".join(shlex.quote(x) for x in cmd))
        subprocess.run(cmd, check=True)
        PY
      - npm --prefix infra run build
      - npm --prefix infra run test
      - npm --prefix web run typecheck
      - |
        python3 - <<'PY'
        import subprocess

        base = "docs/3.詳細設計(DD)/02.アプリ(APP)/21.API詳細(API)"
        targets = [f"{base}/DD-APP-API-{idx:03d}.md" for idx in range(1, 16)]
        cmd = [
            "python3",
            ".opencode/skills/obsidian-doc-check/scripts/validate_vault.py",
            "--docs-root",
            "docs",
            "--report",
            "reports/doc_check.md",
            "--targets",
            *targets,
        ]
        print("+", " ".join(cmd))
        subprocess.run(cmd, check=True)
        PY
      - task docs:ut:pairwise:check

  docs:pdf:
    desc: Build a single PDF from docs (Mermaid rendered, links preserved)
    cmds:
      - |
        bash -lc 'set -e
        command -v pandoc >/dev/null || { echo "pandoc not found"; exit 1; }
        command -v xelatex >/dev/null || { echo "xelatex not found (install TeX Live xetex)"; exit 1; }
        command -v node >/dev/null || { echo "node not found (needed for Mermaid rendering)"; exit 1; }
        python3 -c "import yaml" >/dev/null 2>&1 || { echo "PyYAML not found (pip install PyYAML)"; exit 1; }'
      - python3 scripts/docs_pdf/build_docs_pdf.py --out "{{.DOCS_PDF_OUT}}" --build-dir "{{.DOCS_PDF_BUILD_DIR}}"

  docs:pdf:clean:
    desc: Clean docs PDF build artifacts
    cmds:
      - rm -rf "{{.DOCS_PDF_BUILD_DIR}}"
      - rm -f "{{.DOCS_PDF_OUT}}"

  quartz:prepare:
    desc: Clone Quartz if missing (not tracked)
    cmds:
      - |
        bash -lc 'if [ ! -d "{{.QUARTZ_DIR}}" ]; then
          git clone https://github.com/jackyzha0/quartz.git "{{.QUARTZ_DIR}}"
        elif [ ! -d "{{.QUARTZ_DIR}}/.git" ] || [ ! -f "{{.QUARTZ_DIR}}/package-lock.json" ] || [ ! -d "{{.QUARTZ_DIR}}/quartz/styles" ]; then
          echo "Quartz directory is incomplete. Re-cloning..."
          rm -rf "{{.QUARTZ_DIR}}"
          git clone https://github.com/jackyzha0/quartz.git "{{.QUARTZ_DIR}}"
        else
          echo "Quartz already exists at {{.QUARTZ_DIR}}"
        fi'

  quartz:install:
    desc: Install Quartz dependencies
    deps:
      - quartz:prepare
    dir: '{{.QUARTZ_DIR}}'
    cmds:
      - npm ci

  quartz:sync-config:
    desc: Sync tracked Quartz config and style
    deps:
      - quartz:prepare
    cmds:
      - cp "{{.QUARTZ_CONFIG_SOURCE}}" "{{.QUARTZ_DIR}}/quartz.config.ts"
      - cp "{{.QUARTZ_CUSTOM_STYLE_SOURCE}}" "{{.QUARTZ_DIR}}/quartz/styles/custom.scss"
      - cp "{{.ROOT_DIR}}/config/quartz/quartz.layout.ts" "{{.QUARTZ_DIR}}/quartz.layout.ts"
      - cp "{{.ROOT_DIR}}/config/quartz/components/BuildInfo.tsx" "{{.QUARTZ_DIR}}/quartz/components/BuildInfo.tsx"

  quartz:build:
    desc: Build Quartz public from docs
    deps:
      - quartz:install
      - quartz:sync-config
    dir: '{{.QUARTZ_DIR}}'
    cmds:
      - |
        bash -lc 'DIOPSIDE_DOCS_BRANCH="${GITHUB_REF_NAME:-$(git -C "{{.ROOT_DIR}}" rev-parse --abbrev-ref HEAD)}" \
        DIOPSIDE_DOCS_COMMIT="${GITHUB_SHA:-$(git -C "{{.ROOT_DIR}}" rev-parse HEAD)}" \
        npx quartz build -d ../docs'

  quartz:build:ci:
    desc: Build Quartz public sequentially for CI
    dir: '{{.QUARTZ_DIR}}'
    cmds:
      - task quartz:prepare
      - |
        bash -lc 'if [ -f "package-lock.json" ]; then
          npm ci
        else
          npm install
        fi'
      - cp "{{.QUARTZ_CONFIG_SOURCE}}" "{{.QUARTZ_DIR}}/quartz.config.ts"
      - cp "{{.QUARTZ_CUSTOM_STYLE_SOURCE}}" "{{.QUARTZ_DIR}}/quartz/styles/custom.scss"
      - cp "{{.ROOT_DIR}}/config/quartz/quartz.layout.ts" "{{.QUARTZ_DIR}}/quartz.layout.ts"
      - cp "{{.ROOT_DIR}}/config/quartz/components/BuildInfo.tsx" "{{.QUARTZ_DIR}}/quartz/components/BuildInfo.tsx"
      - |
        bash -lc 'DIOPSIDE_DOCS_BRANCH="${GITHUB_REF_NAME:-$(git -C "{{.ROOT_DIR}}" rev-parse --abbrev-ref HEAD)}" \
        DIOPSIDE_DOCS_COMMIT="${GITHUB_SHA:-$(git -C "{{.ROOT_DIR}}" rev-parse HEAD)}" \
        npx quartz build -d ../docs'

  infra:install:
    desc: Install CDK dependencies
    dir: '{{.INFRA_DIR}}'
    cmds:
      - npm ci

  infra:build:
    desc: Build CDK TypeScript
    deps:
      - infra:install
    dir: '{{.INFRA_DIR}}'
    cmds:
      - npm run build

  infra:synth:
    desc: Synthesize CDK template for docs delivery
    deps:
      - quartz:build
      - infra:build
    dir: '{{.INFRA_DIR}}'
    cmds:
      - npm run synth -- --context siteAssetPath={{.SITE_ASSET_PATH}} {{.STACK}} {{.CDK_ARGS}}

  infra:deploy:
    desc: Deploy docs assets with CDK
    deps:
      - quartz:build
      - infra:build
    dir: '{{.INFRA_DIR}}'
    cmds:
      - npm run deploy -- --context siteAssetPath={{.SITE_ASSET_PATH}} {{.STACK}} {{.CDK_ARGS}}

  infra:deploy:ci:
    desc: Deploy docs assets with CDK (CI serial)
    dir: '{{.INFRA_DIR}}'
    cmds:
      - task quartz:build:ci
      - npm ci
      - npm run build
      - npm run deploy -- --context siteAssetPath={{.SITE_ASSET_PATH}} {{.STACK}} {{.CDK_ARGS}}

  api:openapi:generate:
    desc: Generate OpenAPI artifacts from API code
    dir: '{{.API_DIR}}'
    cmds:
      - npm ci
      - npm run prisma:generate
      - npm run openapi:generate

  api:openapi:check:
    desc: Validate BD API IF docs against generated OpenAPI
    dir: '{{.API_DIR}}'
    cmds:
      - npm run openapi:check

  api:docs:generate:
    desc: Generate BD API IF markdown docs from OpenAPI
    dir: '{{.API_DIR}}'
    cmds:
      - npm run docs:generate

  api:docs:check:
    desc: Check generated BD API IF markdown docs are up to date
    dir: '{{.API_DIR}}'
    cmds:
      - npm run docs:check

  docs:verify:
    desc: Verify deployed docs top page (optional DOCS_SITE_URL)
    cmds:
      - |
        bash -lc 'if [ -z "{{.DOCS_SITE_URL}}" ]; then
          echo "DOCS_SITE_URL is empty. Skip HTTP verification."
          exit 0
        fi
        curl -fsSL "{{.DOCS_SITE_URL}}/" > /dev/null
        curl -fsSL "{{.DOCS_SITE_URL}}/docs/" > /dev/null
        echo "Verified: {{.DOCS_SITE_URL}}/"'

  docs:deploy:
    desc: Run docs guard + Quartz build + CDK deploy
    cmds:
      - task api:openapi:generate
      - task api:docs:generate
      - task docs:guard
      - task api:docs:check
      - task api:openapi:check
      - task infra:deploy
      - task docs:verify

  docs:deploy:ci:
    desc: Run docs deploy with serial CI steps
    cmds:
      - task api:openapi:generate
      - task api:docs:generate
      - task docs:guard
      - task api:docs:check
      - task api:openapi:check
      - task infra:deploy:ci
      - task docs:verify
