openapi: 3.0.0
info:
  title: diopside backend api
  version: 1.0.0
  description: Backend API aligned with DD-APP-API-002..015
components:
  schemas:
    TriggerMode:
      type: string
      enum:
        - manual
        - scheduled
    RunKind:
      type: string
      enum:
        - official_ingestion
        - appearance_supplement
        - incremental_update
    TargetType:
      type: string
      enum:
        - official
        - appearance
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: number
        detail:
          type: string
        instance:
          type: string
        code:
          type: string
        retryable:
          type: boolean
        trace_id:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
              code:
                type: string
            required:
              - message
      required:
        - type
        - title
        - status
        - detail
        - instance
        - code
        - trace_id
    CreateIngestionRunRequest:
      type: object
      properties:
        trigger_mode:
          $ref: "#/components/schemas/TriggerMode"
        run_kind:
          $ref: "#/components/schemas/RunKind"
        target_types:
          type: array
          items:
            $ref: "#/components/schemas/TargetType"
        from_published_at:
          type: string
          format: date-time
        dry_run:
          type: boolean
      required:
        - trigger_mode
        - run_kind
        - target_types
    RunStatus:
      type: string
      enum:
        - queued
        - running
        - succeeded
        - failed
        - partial
        - cancelled
    PublishStatus:
      type: string
      enum:
        - queued
        - running
        - succeeded
        - failed
        - partial
        - cancelled
        - rolled_back
  parameters: {}
paths:
  /api/v1/ops/ingestion/runs:
    post:
      operationId: createIngestionRun
      tags:
        - ops
      parameters:
        - schema:
            type: string
            example: Bearer token
          required: true
          name: authorization
          in: header
        - schema:
            type: string
            example: key-123
          required: true
          name: idempotency-key
          in: header
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIngestionRunRequest"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                    format: uuid
                  accepted_at:
                    type: string
                    format: date-time
                  trigger_mode:
                    $ref: "#/components/schemas/TriggerMode"
                  run_kind:
                    $ref: "#/components/schemas/RunKind"
                  target_types:
                    type: array
                    items:
                      $ref: "#/components/schemas/TargetType"
                required:
                  - run_id
                  - accepted_at
                  - trigger_mode
                  - run_kind
                  - target_types
        "400":
          description: Bad request
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: Conflict
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/ops/ingestion/runs/{runId}:
    get:
      operationId: getIngestionRun
      tags:
        - ops
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: runId
          in: path
      responses:
        "200":
          description: Run detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                    format: uuid
                  accepted_at:
                    type: string
                    format: date-time
                  trigger_mode:
                    $ref: "#/components/schemas/TriggerMode"
                  run_kind:
                    $ref: "#/components/schemas/RunKind"
                  target_types:
                    type: array
                    items:
                      $ref: "#/components/schemas/TargetType"
                  status:
                    $ref: "#/components/schemas/RunStatus"
                  processed_count:
                    type: number
                  error_summary:
                    type: string
                    nullable: true
                required:
                  - run_id
                  - accepted_at
                  - trigger_mode
                  - run_kind
                  - target_types
                  - status
                  - processed_count
                  - error_summary
        "404":
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/ops/ingestion/runs/{runId}/items:
    get:
      operationId: getIngestionItems
      tags:
        - ops
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: runId
          in: path
        - schema:
            type: string
            enum:
              - succeeded
              - failed
              - unprocessed
          required: false
          name: status
          in: query
        - schema:
            type: integer
            nullable: true
          required: false
          name: limit
          in: query
        - schema:
            type: string
          required: false
          name: cursor
          in: query
      responses:
        "200":
          description: Run items
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                    format: uuid
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        video_id:
                          type: string
                        source_type:
                          $ref: "#/components/schemas/TargetType"
                        update_type:
                          type: string
                          enum:
                            - new
                            - existing
                            - backfill
                            - recheck
                        status:
                          type: string
                          enum:
                            - succeeded
                            - failed
                        error_code:
                          type: string
                          nullable: true
                      required:
                        - video_id
                        - source_type
                        - update_type
                        - status
                        - error_code
                required:
                  - run_id
                  - items
  /api/v1/ops/ingestion/runs/{runId}/retry:
    post:
      operationId: retryIngestionRun
      tags:
        - ops
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: runId
          in: path
        - schema:
            type: string
          required: true
          name: idempotency-key
          in: header
      responses:
        "202":
          description: Retry accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                    format: uuid
                  parent_run_id:
                    type: string
                    format: uuid
                  accepted_at:
                    type: string
                    format: date-time
                required:
                  - run_id
                  - parent_run_id
                  - accepted_at
  /api/v1/ops/ingestion/latest:
    get:
      operationId: getIngestionLatest
      tags:
        - ops
      responses:
        "200":
          description: Latest summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  last_success_at:
                    type: string
                    nullable: true
                    format: date-time
                  last_run_id:
                    type: string
                    nullable: true
                    format: uuid
                  target_counts:
                    type: object
                    properties:
                      official:
                        type: number
                      appearance:
                        type: number
                      total:
                        type: number
                    required:
                      - official
                      - appearance
                      - total
                  warnings:
                    type: array
                    items:
                      type: string
                required:
                  - last_success_at
                  - last_run_id
                  - target_counts
                  - warnings
  /api/v1/ops/diagnostics/health:
    get:
      operationId: getHealth
      tags:
        - ops
      responses:
        "200":
          description: Diagnostics
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                      - degraded
                      - critical
                  checks:
                    type: object
                    properties:
                      data_freshness:
                        type: string
                      tag_master_consistency:
                        type: string
                      archive_page_completeness:
                        type: string
                      distribution_availability:
                        type: string
                    required:
                      - data_freshness
                      - tag_master_consistency
                      - archive_page_completeness
                      - distribution_availability
                required:
                  - status
                  - checks
  /api/v1/ops/rechecks:
    post:
      operationId: createRecheckRun
      tags:
        - ops
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
                - type: object
                  properties:
                    run_id:
                      type: string
                      format: uuid
                  required:
                    - run_id
                - type: object
                  properties:
                    mode:
                      type: string
                      enum:
                        - before_delivery
                        - after_delivery
                    targetVideoIds:
                      type: array
                      items:
                        type: string
                  required:
                    - mode
                    - targetVideoIds
      responses:
        "202":
          description: Recheck accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  recheck_run_id:
                    type: string
                    format: uuid
                  run_id:
                    type: string
                    format: uuid
                  status:
                    $ref: "#/components/schemas/RunStatus"
                  started_at:
                    type: string
                    format: date-time
                required:
                  - recheck_run_id
                  - run_id
                  - status
                  - started_at
  /api/v1/ops/rechecks/{recheckRunId}:
    get:
      operationId: getRecheckRun
      tags:
        - ops
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: recheckRunId
          in: path
      responses:
        "200":
          description: Recheck detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  recheck_run_id:
                    type: string
                    format: uuid
                  run_id:
                    type: string
                    format: uuid
                  status:
                    $ref: "#/components/schemas/RunStatus"
                  started_at:
                    type: string
                    format: date-time
                  finished_at:
                    type: string
                    nullable: true
                    format: date-time
                  diff_summary:
                    type: object
                    properties:
                      changed_count:
                        type: number
                      unchanged_count:
                        type: number
                    required:
                      - changed_count
                      - unchanged_count
                required:
                  - recheck_run_id
                  - run_id
                  - status
                  - started_at
                  - finished_at
                  - diff_summary
  /api/v1/admin/tags:
    post:
      operationId: createTag
      tags:
        - admin
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tag_name:
                  type: string
                  minLength: 1
                tag_type_id:
                  type: integer
                  minimum: 0
                  exclusiveMinimum: true
                synonyms:
                  type: array
                  items:
                    type: string
                  default: []
                is_active:
                  type: boolean
                  default: true
              required:
                - tag_name
                - tag_type_id
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  tag_id:
                    type: string
                  updated_at:
                    type: string
                    format: date-time
                required:
                  - tag_id
                  - updated_at
        "409":
          description: Conflict
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /api/v1/admin/tags/{tagId}:
    patch:
      operationId: patchTag
      tags:
        - admin
      parameters:
        - schema:
            type: string
          required: true
          name: tagId
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tag_name:
                  type: string
                synonyms:
                  type: array
                  items:
                    type: string
                is_active:
                  type: boolean
                merged_into:
                  type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  tag_id:
                    type: string
                  propagation_state:
                    type: string
                    enum:
                      - pending_publish
                      - published
                  updated_at:
                    type: string
                    format: date-time
                required:
                  - tag_id
                  - propagation_state
                  - updated_at
  /api/v1/admin/videos/{videoId}/tags:
    patch:
      operationId: patchVideoTags
      tags:
        - admin
      parameters:
        - schema:
            type: string
          required: true
          name: videoId
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                set:
                  type: array
                  items:
                    type: string
                unset:
                  type: array
                  items:
                    type: string
                reason:
                  type: string
                  minLength: 1
              required:
                - set
                - unset
                - reason
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  video_id:
                    type: string
                  tag_ids:
                    type: array
                    items:
                      type: string
                  updated_at:
                    type: string
                required:
                  - video_id
                  - tag_ids
                  - updated_at
  /api/v1/admin/tagging/prompts:
    post:
      operationId: createTaggingPrompt
      tags:
        - admin
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                run_id:
                  type: string
                  format: uuid
                video_ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
                include_fields:
                  type: array
                  items:
                    type: string
              required:
                - run_id
                - video_ids
                - include_fields
      responses:
        "200":
          description: Prompt
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt_text:
                    type: string
                  prompt_version:
                    type: string
                  video_count:
                    type: number
                  generated_at:
                    type: string
                    format: date-time
                required:
                  - prompt_text
                  - prompt_version
                  - video_count
                  - generated_at
  /api/v1/admin/tagging/imports:
    post:
      operationId: importTaggingJson
      tags:
        - admin
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                schema_version:
                  type: string
                  enum:
                    - v1
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      video_id:
                        type: string
                      set:
                        type: array
                        items:
                          type: string
                      unset:
                        type: array
                        items:
                          type: string
                      reason:
                        type: string
                    required:
                      - video_id
                      - set
                      - unset
                      - reason
              required:
                - schema_version
                - items
      responses:
        "200":
          description: Imported
          content:
            application/json:
              schema:
                type: object
                properties:
                  import_run_id:
                    type: string
                    format: uuid
                  validated_count:
                    type: number
                  applied_count:
                    type: number
                  rejected_count:
                    type: number
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        index:
                          type: number
                        code:
                          type: string
                        message:
                          type: string
                        field:
                          type: string
                      required:
                        - index
                        - code
                        - message
                  next_action:
                    type: string
                    enum:
                      - publish_required
                      - no_change
                  publish_scope:
                    type: string
                required:
                  - import_run_id
                  - validated_count
                  - applied_count
                  - rejected_count
                  - errors
                  - next_action
  /api/v1/admin/docs/publish:
    post:
      operationId: createDocsPublishRun
      tags:
        - admin
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                targetRef:
                  type: string
                forceInvalidate:
                  type: boolean
                reason:
                  type: string
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  docs_publish_run_id:
                    type: string
                    format: uuid
                  status:
                    $ref: "#/components/schemas/PublishStatus"
                  started_at:
                    type: string
                    format: date-time
                required:
                  - docs_publish_run_id
                  - status
                  - started_at
  /api/v1/admin/docs/publish/{docsPublishRunId}:
    get:
      operationId: getDocsPublishRun
      tags:
        - admin
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: docsPublishRunId
          in: path
      responses:
        "200":
          description: Run status
          content:
            application/json:
              schema:
                type: object
                properties:
                  docs_publish_run_id:
                    type: string
                    format: uuid
                  status:
                    $ref: "#/components/schemas/PublishStatus"
                  steps:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        status:
                          $ref: "#/components/schemas/PublishStatus"
                      required:
                        - name
                        - status
                  rollback:
                    type: object
                    properties:
                      executed:
                        type: boolean
                      rollback_to_version:
                        type: string
                    required:
                      - executed
                required:
                  - docs_publish_run_id
                  - status
                  - steps
                  - rollback
  /api/v1/admin/publish/tag-master:
    post:
      operationId: createTagMasterPublishRun
      tags:
        - admin
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                scope:
                  type: string
                  enum:
                    - tag_master
                    - archive
                    - all
                  default: all
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  publish_run_id:
                    type: string
                    format: uuid
                  status:
                    $ref: "#/components/schemas/RunStatus"
                required:
                  - publish_run_id
                  - status
  /api/v1/admin/publish/{publishRunId}:
    get:
      operationId: getPublishRun
      tags:
        - admin
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: publishRunId
          in: path
      responses:
        "200":
          description: Run status
          content:
            application/json:
              schema:
                type: object
                properties:
                  publish_run_id:
                    type: string
                    format: uuid
                  publish_type:
                    type: string
                    enum:
                      - tag_master
                      - archive
                      - all
                      - docs
                  status:
                    $ref: "#/components/schemas/PublishStatus"
                  started_at:
                    type: string
                    format: date-time
                  finished_at:
                    type: string
                    nullable: true
                    format: date-time
                  triggered_by:
                    type: string
                  steps:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        status:
                          $ref: "#/components/schemas/PublishStatus"
                      required:
                        - name
                        - status
                  rollback:
                    type: object
                    properties:
                      executed:
                        type: boolean
                      rollback_to_version:
                        type: string
                    required:
                      - executed
                  error_code:
                    type: string
                    nullable: true
                  error_message:
                    type: string
                    nullable: true
                  retryable:
                    type: boolean
                required:
                  - publish_run_id
                  - publish_type
                  - status
                  - started_at
                  - finished_at
                  - triggered_by
                  - steps
                  - rollback
                  - error_code
                  - error_message
                  - retryable
  /api/v1/public/bootstrap:
    get:
      operationId: getBootstrapContract
      tags:
        - public-contract
      responses:
        "200":
          description: Bootstrap contract
          content:
            application/json:
              schema:
                type: object
                properties:
                  schema_version:
                    type: string
                  bootstrap_version:
                    type: string
                  generated_at:
                    type: string
                    format: date-time
                  tag_master_version:
                    type: string
                  archive_version:
                    type: string
                  tag_types:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                        key:
                          type: string
                        name:
                          type: string
                      required:
                        - id
                        - key
                        - name
                  tag_preview:
                    type: array
                    items:
                      type: array
                      items:
                        anyOf:
                          - type: string
                          - type: number
                  latest:
                    type: array
                    items:
                      type: array
                      items:
                        anyOf:
                          - type: string
                          - type: number
                          - type: array
                            items:
                              type: number
                  next:
                    type: object
                    properties:
                      tag_master:
                        type: object
                        properties:
                          url:
                            type: string
                        required:
                          - url
                      archive_index:
                        type: object
                        properties:
                          url_pattern:
                            type: string
                          page_size:
                            type: number
                        required:
                          - url_pattern
                          - page_size
                    required:
                      - tag_master
                      - archive_index
                required:
                  - schema_version
                  - bootstrap_version
                  - generated_at
                  - tag_master_version
                  - archive_version
                  - tag_types
                  - tag_preview
                  - latest
                  - next
  /api/v1/public/tag-master:
    get:
      operationId: getTagMasterContract
      tags:
        - public-contract
      responses:
        "200":
          description: Tag master contract
          content:
            application/json:
              schema:
                type: object
                properties:
                  schema_version:
                    type: string
                  tag_master_version:
                    type: string
                  generated_at:
                    type: string
                    format: date-time
                  tag_types:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                        key:
                          type: string
                        name:
                          type: string
                      required:
                        - id
                        - key
                        - name
                  tags:
                    type: array
                    items:
                      type: array
                      items:
                        anyOf:
                          - type: number
                          - type: string
                required:
                  - schema_version
                  - tag_master_version
                  - generated_at
                  - tag_types
                  - tags
  /api/v1/public/archive-index:
    get:
      operationId: getArchiveIndexContract
      tags:
        - public-contract
      parameters:
        - schema:
            type: integer
            nullable: true
            minimum: 0
            default: 0
          required: false
          name: page
          in: query
      responses:
        "200":
          description: Archive index contract
          content:
            application/json:
              schema:
                type: object
                properties:
                  schema_version:
                    type: string
                  archive_version:
                    type: string
                  tag_master_version:
                    type: string
                  generated_at:
                    type: string
                    format: date-time
                  page:
                    type: number
                  page_size:
                    type: number
                  total:
                    type: number
                  items:
                    type: array
                    items:
                      type: array
                      items:
                        anyOf:
                          - type: string
                          - type: number
                          - type: array
                            items:
                              type: number
                required:
                  - schema_version
                  - archive_version
                  - tag_master_version
                  - generated_at
                  - page
                  - page_size
                  - total
                  - items
  /api/v1/search:
    get:
      operationId: searchVideos
      tags:
        - public-query
      parameters:
        - schema:
            type: string
            default: ""
          required: false
          name: q
          in: query
      responses:
        "200":
          description: Search result
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        video_id:
                          type: string
                        title:
                          type: string
